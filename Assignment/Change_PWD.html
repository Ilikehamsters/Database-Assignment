<!DOCTYPE html>
<html>
    <head>
        <title>Password Change</title>
        <link rel="stylesheet" href="Change_PWD.css">
    </head>
    <body>
        <form>
            <label for="New_PWD" id="New_PWD">New Password:</label>
            <input type="text" id="New_PWD" name="New_PWD" placeholder="Type new password" required>
            <label for="Conf_PWD" id="Conf_PWD">Confirm Password:</label>
            <input type="text" id="Conf_PWD" name="Conf_PWD" placeholder="Confirm new password" required>
            <input id="submit_button" type="submit" value="submit">
        </form>
    </body>
</html>
