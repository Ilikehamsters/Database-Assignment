<!DOCTYPE html>
<html>
    <head>
        <title>Student Profile Page</title>
        <link rel="stylesheet" href="Student_Profile.css">
    </head>
    <body>
        <header>
            <h1 id="title">Student Profile</h1>
        </header>
        <form id="searchbar">
            <h3>Search (Student ID/Name):</h3>
            <input class="inputbox" type="text" id="student_ID" placeholder="Enter Student ID; e.g. 1000234">
            <input class="inputbox" type="text" id="student_name" placeholder="Enter Student's Full Name">
            <button class="searchbtn">Search</button>
            <button class="searchbtn">Clear</button>
        </form>
        <main>
            <section>
                <article id="tableContainer">
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Student ID</th>
                                <th>Student name</th>
                                <th>Gender</th>
                                <th>Program</th>
                                <th>Contact No.</th>
                                <th>Enroll date</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </article>
            </section>
        </main>
    </body>
</html>
