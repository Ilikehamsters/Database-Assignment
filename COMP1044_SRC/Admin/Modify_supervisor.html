<!DOCTYPE html>
<html>
    <head>
        <title>Modify Supervisor Page</title>
    </head>
    <body>
        <header>
            <h1>Modify Supervisor Details</h1>
        </header>
        <main>
            <form action="Modify_supervisor.php" method="post">
                <input type="hidden" id="hidden_supervID" name="supervID">

                <label for="Name">Full Name:</label>
                <input type="text" maxlength="60" id="Name" name="name" value="" placeholder="Enter Full Name..." required><br>

                <label for="contact">Contact Number:</label>
                <input type="text" maxlength="16" id="contact" name="contact" value="" placeholder="Enter phone number..." required><br>

                <label for="email">Email address:</label>
                <input type="text" maxlength="50" id="email" name="email" value="" placeholder="Enter email address..." required><br>

                <label for="company">Company:</label>
                <select id="company" name="company" required>
                    <option value="">...</option>
                </select><br>


                <label for="gender">Gender:</label>
                <input type="radio" id="Male" name="gender" value="Male" required>
                <label for="Male">Male</label>
                <input type="radio" id="Female" name="gender" value="Female" required>
                <label for="Female">Female</label><br>

                <input type="submit" value="Submit">
                <input type="reset" value="Clear"><br>
                <button type="button">Back</button>
            </form>
        </main>
        <script>
            const backbtn = document.querySelector("button");
            function backfunction() {
                let confirmation = confirm("Are you sure you want to go back? By clicking 'OK', all unsubmitted data will be lost.");
                if (confirmation) {
                    window.location.href = "Supervisor_manage.html"
                }
            }
            backbtn.addEventListener("click", backfunction);

            document.addEventListener("DOMContentLoaded", () => {
                const name = document.getElementById('Name');
                const contact = document.getElementById('contact');
                const email = document.getElementById('email');
                const company = document.getElementById('company');
                const hid_supervID = document.getElementById('hidden_supervID');

                const urlParams = new URLSearchParams(window.location.search);
                const supervID = urlParams.get('supervID');
                hid_supervID.value = supervID;

                fetch(`Modify_supervisor.php?supervID=${supervID}`)
                    .then(response => response.json())
                    .then(data => {
                        const Supervisor = data.supervisor;
                        const allCompanies = data.companies;

                        // 1. Populate standard inputs
                        name.value = Supervisor.Full_Name;
                        contact.value = Supervisor.Contact_No;
                        email.value = Supervisor.Email_Addr;

                        // 2. Handle Gender
                        if (Supervisor.Gender === "Male") document.getElementById('Male').checked = true;
                        if (Supervisor.Gender === "Female") document.getElementById('Female').checked = true;

                        // 3. Populate Select List with ALL companies
                        company.innerHTML = '<option value="">--Select company--</option>'; // Clear existing options

                        allCompanies.forEach(comp => {
                            const option = document.createElement('option');
                            option.value = comp.Reg_Comp_Name;
                            option.textContent = comp.Reg_Comp_Name;

                            // If this Company matches the Supervisor's current one, select it
                            if (comp.Reg_Comp_Name === Supervisor.Reg_Comp_Name) {
                                option.selected = true;
                            }

                            company.appendChild(option);
                        });
                    })
                    .catch(error => console.error('Error:', error));
            });
        </script>
    </body>
</html>
