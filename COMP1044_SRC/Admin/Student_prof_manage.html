<!DOCTYPE html>
<html>
    <head>
        <title>Student Profile Page</title>

    </head>
    <body>
        <header>
            <h1 id="title">Student Profile</h1>
        </header>
        <form id="searchbar" action="Student_prof_manage.php" method="get">
            <h3>Search (Student ID/Name):</h3>
            <input class="inputbox" type="number" id="student_ID" name="ID" value="" placeholder="Enter Student ID...">
            <input class="inputbox" type="search" id="student_name" name="name" value="" placeholder="Enter Student's Full Name...">
            <input class="searchbtn" type="submit" value="Search">
            <input class="searchbtn" type="reset" value="Clear">
        </form>
        <main>
            <section>
                <button id="addbtn" type="button">ADD+</button>
                <article id="tableContainer">
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Student ID</th>
                                <th>Student name</th>
                                <th>Gender</th>
                                <th>Program</th>
                                <th>Contact No.</th>
                                <th>Enroll date</th>
                                <th>Email</th>
                                <th colspan="2"></th>
                            </tr>
                        </thead>
                        <tbody id="record">
                        </tbody>
                    </table>
                </article>
            </section>
        </main>
        <script>
            /*const modal = document.getElementById("modifyModal");

            const params = new URLSearchParams(window.location.search);
            if (params.get("modify") == "success") {
                alert("Successfully modifed student data!");
                // Clean the URL so refreshing doesn't re-trigger the alert
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (params.get("redirect") == "success") {
                alert("You're being redirected to the home page as you are currently logged into an account. Please ensure you are logged into the correct role if you were previously trying to access a different page.");
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (params.get("add") == "success") {
                alert("Successfully added student data!");
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (params.get("delete") == "success") {
                alert("Successfully deleted student data");
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            fetch('Student_prof_manage.php')
                .then(response => response.json())
                .then(data => {
                    renderTable(data); // Call a function to update the UI
                })
                .catch(err => console.error("Search error:", err));

            const searchForm = document.getElementById("searchbar");

            searchForm.addEventListener("submit", (e) => {
                e.preventDefault(); // Stop the browser from leaving the page

                const formData = new FormData(searchForm);
                const params = new URLSearchParams(formData).toString();

                // Fetch from PHP with the search parameters
                fetch(`Student_prof_manage.php?${params}`)
                    .then(response => response.json())
                    .then(data => {
                        renderTable(data); // Call a function to update the UI
                    })
                    .catch(err => console.error("Search error:", err));
            });

            function renderTable(data) {
                const tableBody = document.getElementById('record');
                tableBody.innerHTML = ''; // Clear the table

                data.forEach(student => {
                    const row = document.createElement('tr');
                    if (student.Error_msg) {
                        row.innerHTML = `<td colspan="10" style="text-align:center; color:red; font-size:18px; font-weight:bold;">${student.Error_msg}</td>`;

                    } else {
                        row.innerHTML = `
                        <td>${student.User_ID}</td>
                        <td>${student.Student_ID}</td>
                        <td>${student.Full_Name}</td>
                        <td>${student.Gender}</td>
                        <td>${student.Prog_Code}</td>
                        <td>${student.Contact_No}</td>
                        <td>${student.Enroll_Date}</td>
                        <td>${student.Email_Addr}</td>
                        <td><button class="modifybtn" data-id="${student.Student_ID}">Modify</button></td>
                        <td><button class="deletebtn" data-id="${student.User_ID}">Delete</button></td>`;
                    }
                    tableBody.appendChild(row);
                });
            }

            const add = document.getElementById("addbtn");
            add.addEventListener("click", () => window.location.href = "Add_student.html");

            // Use Event Delegation for dynamic buttons
            const tableBody = document.getElementById('record');
            tableBody.addEventListener("click", async (e) => {

                // Check if the clicked element is a Modify button
                if (e.target.classList.contains("modifybtn")) {
                    const studID = e.target.getAttribute("data-id");
                    // Redirect with the ID as a query string
                    window.location.href = `Modify_student.html?studID=${studID}`;
                }

                // Check if the clicked element is a Delete button
                if (e.target.classList.contains("deletebtn")) {
                    const userID = e.target.getAttribute("data-id");
                    let confirmation = confirm("**WARNING** By clicking 'OK', the record will be permanently deleted.");
                    if (confirmation) {
                        try {
                            const response = await fetch(`Student_prof_manage.php?userID=${userID}`);
                            if (response.ok) {
                                alert("Deleted successfully!");
                                location.reload();
                            } else {
                                alert("Error deleting record.");
                            }
                        } catch (error) {
                            console.error("Delete failed:", error);
                        }

                        //window.location.href = `Student_prof_manage.php?studID=${studID}`;
                    }
                }
            });

        </script>
