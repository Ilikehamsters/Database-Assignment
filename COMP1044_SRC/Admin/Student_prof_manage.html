            <button class="searchbtn">Search</button>
            <button class="searchbtn">Clear</button>
        </form>
        <main>
            <section>
                <button id="addbtn" type="button">ADD+</button>
                <article id="tableContainer">
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Student ID</th>
                                <th>Student name</th>
                                <th>Gender</th>
                                <th>Program</th>
                                <th>Contact No.</th>
                                <th>Enroll date</th>
                                <th>Email</th>
                                <th colspan="2"></th>
                            </tr>
                        </thead>
                        <tbody id="record">
                        </tbody>
                    </table>
                </article>
            </section>
        </main>

            document.addEventListener("DOMContentLoaded", () => {
            const tableBody = document.getElementById('record');

            fetch('Student_prof_manage.php')
                .then(response => response.json())
                .then(data => {

                    tableBody.innerHTML = '';

                    // 2. Iterate through the database results
                    data.forEach(student => {
                        const row = document.createElement('tr');

                        // 3. Assign values to TD elements (Matching your database column names)
                        row.innerHTML = `
                            <td>${student.User_ID}</td>
                            <td>${student.Student_ID}</td>
                            <td>${student.Full_Name}</td>
                            <td>${student.Gender}</td>
                            <td>${student.Prog_Code}</td>
                            <td>${student.Contact_No}</td>
                            <td>${student.Enroll_Date}</td>
                            <td>${student.Email_Addr}</td>
                            <td><button class="modifybtn" type="button">Modify</button></td>
                            <td><button class="deletebtn" type="button">Delete</button></td>
                        `;
                        
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    tableBody.innerHTML = '<tr><td colspan="10">Error loading student records.</td></tr>';
                });
        });
