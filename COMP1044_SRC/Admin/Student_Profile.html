<!DOCTYPE html>
<html>
    <head>
        <title>Student Profile Page</title>
        <link rel="stylesheet" href="Management.css">
    </head>
    <body>
        <header>
            <h1 id="title">Student Profile</h1>
        </header>
        <form id="searchbar">
            <h3>Search (Student ID/Name):</h3>
            <input class="inputbox" type="number" id="student_ID" placeholder="Enter Student ID; e.g. 1000234">
            <input class="inputbox" type="search" id="student_name" placeholder="Enter Student's Full Name">
            <button class="searchbtn">Search</button>
            <button class="searchbtn">Clear</button>
        </form>
        <main>
            <section>
                <button id="addbtn">ADD +</button>
                <article id="tableContainer">
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Student ID</th>
                                <th>Student name</th>
                                <th>Gender</th>
                                <th>Program</th>
                                <th>Contact No.</th>
                                <th>Enroll date</th>
                                <th>Email</th>
                                <th colspan="2"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <td>1</td>
                            <td>1</td>
                            <td>James</td>
                            <td>Male</td>
                            <td>Data Science</td>
                            <td>+605453453</td>
                            <td>2025-02-01</td>
                            <td>James@gmail.com</td>
                            <td><button>Modify</button></td>
                            <td><button>Delete</button></td>
                        </tbody>
                    </table>
                </article>
            </section>
        </main>
        <script>

        </script>
    </body>
</html>
