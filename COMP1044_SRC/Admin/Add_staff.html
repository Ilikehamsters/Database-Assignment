<!DOCTYPE html>
<html>
    <head>
        <title>Add University Staff Page</title>
        <link rel="stylesheet" href="addMod.css">
        <link rel="stylesheet" href="../Global.css">
    </head>
    <body>
        <header>
            <h1 id="title">Add University Staff</h1>
        </header>
        <section class="page-layout">
            <main>
                <form action="Add_staff.php" method="post">
                    <article class="form-row">
                        <label for="username">Username:</label>
                        <input type="text" maxlength="12" id="username" name="username" value="" placeholder="Enter username..." required>
                    </article>
                    <article class="form-row">
                        <label for="Name">Full Name:</label>
                        <input type="text" maxlength="60" id="Name" name="name" value="" placeholder="Enter Full Name..." required>
                    </article>
                    <article class="form-row">
                        <label for="contact">Contact Number:</label>
                        <input type="text" maxlength="16" id="contact" name="contact" value="" placeholder="Enter phone number..." required>
                    </article>
                    <article class="form-row">
                        <label for="email">Email address:</label>
                        <input type="text" maxlength="50" id="email" name="email" value="" placeholder="Enter email address..." required>
                    </article>
                    <article class="form-row">
                        <label for="gender">Gender:</label>
                        <article class="radio-group">
                            <input type="radio" id="Male" name="gender" value="Male" required>
                            <label for="Male">Male</label>
                            <input type="radio" id="Female" name="gender" value="Female" required>
                            <label for="Female">Female</label>
                        </article>
                    </article>
                    <article class="form-row">
                        <label for="role">Role:</label>
                        <article class="radio-group">
                            <input type="radio" id="Admin" name="role" value="Admin" required>
                            <label for="Admin">Admin</label>
                            <input type="radio" id="assess" name="role" value="University Assessor" required>
                            <label for="assess">Assessor</label>
                        </article>
                    </article>
                    <article class="form-row">
                        <label for="employ">Employment Date:</label>
                        <input type="date" id="employ" name="employment" value=""required>
                    </article>
                    <article class="form-buttons">
                        <input type="submit" class="formbtn" value="Submit" placeholder="Submit">
                        <input type="reset" class="formbtn" value="Clear">
                        <button type="button" class="formbtn">Back</button>
                    </article>
                </form>
            </main>
            <aside id="imgcontainer">
                <img src="../Assets/Assessor.jpg" alt="Picture of Assessor" class="sideimages">
            </aside>
        </section>
        <script>
            const backbtn = document.querySelector("button");
            function backfunction() {
                let confirmation = confirm("Are you sure you want to go back? By clicking 'OK', all unsubmitted data will be lost.");
                if (confirmation) {
                    window.location.href = "Staff_manage.html"
                }
            }
            
            backbtn.addEventListener("click", backfunction);
        </script>
    </body>
</html>
