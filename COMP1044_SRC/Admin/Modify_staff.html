<!DOCTYPE html>
<html>
    <head>
        <title>Modify University Staff Page</title>
    </head>
    <body>
        <header>
            <h1>Modify University Staff</h1>
        </header>
        <main>
            <form action="Modify_staff.php" method="post">
                <input type="hidden" id="hidden_staffID" name="staffID">

                <label for="Name">Full Name:</label>
                <input type="text" maxlength="60" id="Name" name="name" value="" placeholder="Enter Full Name..." required><br>

                <label for="contact">Contact Number:</label>
                <input type="text" maxlength="16" id="contact" name="contact" value="" placeholder="Enter phone number..." required><br>

                <label for="email">Email address:</label>
                <input type="text" maxlength="50" id="email" name="email" value="" placeholder="Enter email address..." required><br>


                <label for="gender">Gender:</label>
                <input type="radio" id="Male" name="gender" value="Male" required>
                <label for="Male">Male</label>
                <input type="radio" id="Female" name="gender" value="Female" required>
                <label for="Female">Female</label><br>

                <label for="role">Role:</label>
                <input type="radio" id="Admin" name="role" value="Admin" required>
                <label for="Admin">Admin</label>
                <input type="radio" id="assess" name="role" value="University Assessor" required>
                <label for="assess">Assessor</label><br>

                <label for="employ">Employment Date:</label>
                <input type="date" id="employ" name="employment" value="" placeholder="DD/MM/YYYY" required><br>

                <input type="submit" value="Submit" placeholder="Submit">
                <input type="reset" value="Clear"><br>
                <button type="button">Back</button>
            </form>
        </main>
        <script>
            const backbtn = document.querySelector("button");
            function backfunction() {
                let confirmation = confirm("Are you sure you want to go back? By clicking 'OK', all unsubmitted data will be lost.");
                if (confirmation) {
                    window.location.href = "Staff_manage.html"
                }
            }
            backbtn.addEventListener("click", backfunction);

            document.addEventListener("DOMContentLoaded", () => {
                const name = document.getElementById('Name');
                const contact = document.getElementById('contact');
                const email = document.getElementById('email');
                const employ = document.getElementById('employ');
                const hid_staffID = document.getElementById('hidden_staffID');

                const urlParams = new URLSearchParams(window.location.search);
                const staffID = urlParams.get('staffID');
                hid_staffID.value = staffID;

                fetch(`Modify_staff.php?staffID=${staffID}`)
                    .then(response => response.json())
                    .then(data => {
                        const Staff = data.staff;

                        // 1. Populate standard inputs
                        name.value = Staff.Full_Name;
                        contact.value = Staff.Contact_No;
                        email.value = Staff.Email_Addr;
                        employ.value = Staff.Employ_Date;

                        // 2. Handle Gender
                        if (Staff.Gender === "Male") document.getElementById('Male').checked = true;
                        if (Staff.Gender === "Female") document.getElementById('Female').checked = true;

                        if (Staff.Position_Name === "Admin") document.getElementById('Admin').checked = true;
                        if (Staff.Position_Name === "University Assessor") document.getElementById('assess').checked = true;
                    })
                    .catch(error => console.error('Error:', error));
            });
        </script>
    </body>
</html>
