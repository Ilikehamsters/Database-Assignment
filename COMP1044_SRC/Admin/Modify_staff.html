        <script>
            const backbtn = document.querySelector("button");
            function backfunction() {
                let confirmation = confirm("Are you sure you want to go back? By clicking 'OK', all unsubmitted data will be lost.");
                if (confirmation) {
                    window.location.href = "Staff_manage.html"
                }
            }
            backbtn.addEventListener("click", backfunction);

            document.addEventListener("DOMContentLoaded", () => {
                const name = document.getElementById('Name');
                const contact = document.getElementById('contact');
                const email = document.getElementById('email');
                const employ = document.getElementById('employ');
                const hid_staffID = document.getElementById('hidden_staffID');

                const urlParams = new URLSearchParams(window.location.search);
                const staffID = urlParams.get('staffID');
                hid_staffID.value = staffID;

                fetch(`Modify_staff.php?staffID=${staffID}`)
                    .then(response => response.json())
                    .then(data => {
                        const Staff = data.staff;

                        // 1. Populate standard inputs
                        name.value = Staff.Full_Name;
                        contact.value = Staff.Contact_No;
                        email.value = Staff.Email_Addr;
                        employ.value = Staff.Employ_Date;

                        // 2. Handle Gender
                        if (Staff.Gender === "Male") document.getElementById('Male').checked = true;
                        if (Staff.Gender === "Female") document.getElementById('Female').checked = true;

                        if (Staff.Position_Name === "Admin") document.getElementById('Admin').checked = true;
                        if (Staff.Position_Name === "University Assessor") document.getElementById('assess').checked = true;
                    })
                    .catch(error => console.error('Error:', error));
            });
        </script>
    </body>
