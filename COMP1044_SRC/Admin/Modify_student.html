<!DOCTYPE html>
<html>
    <head>
        <title>Modify Student Page</title>
        <link rel="stylesheet" href="addMod.css">
        <link rel="stylesheet" href="../Global.css">
    </head>
    <body>
        <header>
            <h1>Modify Student Details</h1>
        </header>
        <main>
            <form action="Modify_student.php" method="post">
                <input type="hidden" id="hidden_studID" name="studID">

                <label for="name">Full Name:</label>
                <input type="text" maxlength="60" id="name" name="name" value="" placeholder="Enter full name..." required><br>

                <label for="programme">Programme:</label>
                <select id="programme" name="programme" required>
                    <option value="">...</option>
                </select><br>

                <label for="contact">Contact Number:</label>
                <input type="text" id="contact" maxlength="16" name="contact" value="" placeholder="Enter phone number..." required><br>

                <label for="email">Email Address:</label>
                <input type="text" id="email" maxlength="50" name="email" value="" placeholder="Enter email address..." required><br>

                <label for="enroll">Enrollment Date:</label>
                <input type="date" id="enroll" name="enroll" value="" placeholder="DD/MM/YYYY" required><br>

                <label for="gender">Gender:</label>
                <input type="radio" id="Male" name="gender" value="Male" required>
                <label for="Male">Male</label>
                <input type="radio" id="Female" name="gender" value="Female" required>
                <label for="Female">Female</label><br>

                <input type="submit" value="Submit">
                <input type="reset" value="Clear"><br>
                <button type="button">Back</button>
            </form>
        </main>
        <script>
            const backbtn = document.querySelector("button");
            function backfunction() {
                let confirmation = confirm("Are you sure you want to go back? By clicking 'OK', all unsubmitted data will be lost.");
                if (confirmation) {
                    window.location.href = "Student_prof_manage.html"
                }
            }
            backbtn.addEventListener("click", backfunction);

            document.addEventListener("DOMContentLoaded", () => {
                const name = document.getElementById('name');
                const programme = document.getElementById('programme');
                const contact = document.getElementById('contact');
                const email = document.getElementById('email');
                const enroll = document.getElementById('enroll');
                const hid_studID = document.getElementById('hidden_studID');

                const urlParams = new URLSearchParams(window.location.search);
                const studID = urlParams.get('studID');
                hid_studID.value = studID;

                fetch(`Modify_student.php?studID=${studID}`)
                    .then(response => response.json())
                    .then(data => {
                        const student = data.student;
                        const allProgrammes = data.programmes;

                        // 1. Populate standard inputs
                        name.value = student.Full_Name;
                        contact.value = student.Contact_No;
                        email.value = student.Email_Addr;
                        enroll.value = student.Enroll_Date;

                        // 2. Handle Gender
                        if (student.Gender === "Male") document.getElementById('Male').checked = true;
                        if (student.Gender === "Female") document.getElementById('Female').checked = true;

                        // 3. Populate Select List with ALL programmes
                        programme.innerHTML = '<option value="">--Select Program--</option>'; // Clear existing options

                        allProgrammes.forEach(prog => {
                            const option = document.createElement('option');
                            option.value = prog.Programme_Name;
                            option.textContent = prog.Programme_Name;

                            // If this programme matches the student's current one, select it
                            if (prog.Programme_Name === student.Programme_Name) {
                                option.selected = true;
                            }

                            programme.appendChild(option);
                        });
                    })
                    .catch(error => console.error('Error:', error));
            });
        </script>
    </body>
</html>
