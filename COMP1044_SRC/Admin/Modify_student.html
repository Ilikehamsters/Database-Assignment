<!DOCTYPE html>
<html>
    <head>
        <title>Modify Student</title>
    </head>
    <body>
        <header>
            <h1>Modify Student Details</h1>
        </header>
        <main>
            <form>
                <label for="Name">Student Name:</label>
                <input type="text" name="Name" value="" placeholder="Student Name"><br>
                <label for="program">Student Program Code:</label>
                <input type="text" maxlength="5" name="program" value="" placeholder="Program Code"><br>
                <label for="contact">Student contact number:</label>
                <input type="text" name="contact" value="" placeholder="Phone Number" required><br>
                <label for="email">Student email address:</label>
                <input type="text" name="email" value="" placeholder="Email Address" required><br>
                <label for="Enroll">Student enrollment date:</label>
                <input type="date" name="Enroll" value="" placeholder="DD/MM/YYYY" required><br>
                <label for="student_gender">Gender:</label>
                <input type="radio" id="Male" name="student_gender" value="Male" required>
                <label for="Male">Male</label>
                <input type="radio" id="Female" name="student_gender" value="Female" required>
                <label for="Female">Female</label><br>
                <input type="submit" value="Submit" placeholder="Submit">
                <button type="button">Back</button>
            </form>
        </main>
        <script>
            const backbtn = document.querySelector("button");
            function backfunction() {
                let confirmation = confirm("Are you sure you want to go back? By clicking 'OK', all unsubmitted data will be lost.");
                if (confirmation) {
                    window.location.href = "Student_Profile.html"
                }
            }
            backbtn.addEventListener("click", backfunction);
        </script>
    </body>
</html>
